name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30  # ← Global timeout
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            nome_saida: SistemaHotelSantos-Windows.exe
          - os: ubuntu-latest
            nome_saida: SistemaHotelSantos-Linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r sistemahotelsantos/requirements.txt
        timeout-minutes: 10

      - name: Criar executável
        run: |
          cd sistemahotelsantos
          pyinstaller --name="SistemaHotelSantos" --onefile --windowed --clean --noconfirm app_gui.py
        shell: bash
        timeout-minutes: 15

      - name: Renomear arquivo (Windows)
        if: runner.os == 'Windows'
        run: |
          cd sistemahotelsantos\dist
          ren SistemaHotelSantos.exe SistemaHotelSantos-Windows.exe
        shell: cmd

      - name: Renomear arquivo (Linux)
        if: runner.os == 'Linux'
        run: |
          cd sistemahotelsantos/dist
          mv SistemaHotelSantos SistemaHotelSantos-Linux
        shell: bash

      - name: Upload executável
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.nome_saida }}
          path: sistemahotelsantos/dist/${{ matrix.nome_saida }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 10

    steps:
      - name: Baixar arquivos
        uses: actions/download-artifact@v4
        with:
          path: arquivos

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          files: arquivos/*/*
          body: |
            # Release ${{ github.ref_name }}
            
            ## 📥 Downloads
            - **Windows**: SistemaHotelSantos-Windows.exe
            - **Linux**: SistemaHotelSantos-Linux
