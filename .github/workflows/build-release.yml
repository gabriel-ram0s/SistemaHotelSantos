name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            nome_saida: SistemaHotelSantos-Windows.exe
          - os: ubuntu-latest
            nome_saida: SistemaHotelSantos-Linux

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r sistemahotelsantos/requirements.txt

      - name: Criar executável
        run: |
          cd sistemahotelsantos
          pyinstaller --name="SistemaHotelSantos" --onefile --windowed --clean --noconfirm --icon="app.ico" app_gui.py

      - name: Renomear arquivo
        run: |
          cd sistemahotelsantos/dist
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            ren SistemaHotelSantos.exe ${{ matrix.nome_saida }}
          else
            mv SistemaHotelSantos ${{ matrix.nome_saida }}
          fi
        shell: bash

      - name: Upload executável
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.nome_saida }}
          path: sistemahotelsantos/dist/${{ matrix.nome_saida }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Baixar arquivos
        uses: actions/download-artifact@v4
        with:
          path: arquivos

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          files: arquivos/*/*
