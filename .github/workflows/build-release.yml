name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            nome_saida: SistemaHotelSantos-Windows.exe
          - os: ubuntu-latest
            nome_saida: SistemaHotelSantos-Linux

    steps:
      # ✨ IMPORTANTE: Retry automático
      - name: Checkout repository (with retry)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false
        
      # Se falhar, tenta novamente
      - name: Retry checkout if failed
        if: failure()
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r sistemahotelsantos/requirements.txt

      - name: Build executable
        run: |
          cd sistemahotelsantos
          pyinstaller --name="SistemaHotelSantos" --onefile --windowed --clean --noconfirm app_gui.py
        shell: bash

      - name: Rename executable (Windows)
        if: runner.os == 'Windows'
        run: cd sistemahotelsantos\dist && ren SistemaHotelSantos.exe SistemaHotelSantos-Windows.exe
        shell: cmd

      - name: Rename executable (Linux)
        if: runner.os == 'Linux'
        run: cd sistemahotelsantos/dist && mv SistemaHotelSantos SistemaHotelSantos-Linux
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.nome_saida }}
          path: sistemahotelsantos/dist/${{ matrix.nome_saida }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 15

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: arquivos

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: arquivos/*/*
