name: Build & Release

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'sistemahotelsantos/**'
      - '.github/workflows/build-release.yml'

  # Permitir disparo manual via GitHub UI (Opcional)
  workflow_dispatch:
    inputs:
      versao:
        description: 'Versão para build (ex: 5.0.2)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            nome_saida: SistemaHotelSantos-Windows.exe
          - os: ubuntu-latest
            nome_saida: SistemaHotelSantos-Linux

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r sistemahotelsantos/requirements.txt

      - name: Extrair versão
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=$(echo ${{ github.ref }} | sed 's/refs\/tags\/v//')
          else
            VERSION=${{ inputs.versao }}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Criar executável
        run: |
          cd sistemahotelsantos
          pyinstaller --name="SistemaHotelSantos" --onefile --windowed --clean --noconfirm --icon="app.ico" app_gui.py

      - name: Renomear arquivo
        run: |
          cd sistemahotelsantos/dist
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            ren SistemaHotelSantos.exe ${{ matrix.nome_saida }}
          else
            mv SistemaHotelSantos ${{ matrix.nome_saida }}
          fi
        shell: bash

      - name: Upload executável
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.nome_saida }}
          path: sistemahotelsantos/dist/${{ matrix.nome_saida }}

  release:
    needs: build
    runs-on: ubuntu-latest
    # Libera release apenas em push de tags
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Baixar arquivos
        uses: actions/download-artifact@v4
        with:
          path: arquivos

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          files: arquivos/*/*
          body: |
            # Versão ${{ github.ref_name }}
            
            ## Alterações
            - [Adicione as alterações aqui]
            
            ## Downloads
            - **Windows**: SistemaHotelSantos-Windows.exe
            - **Linux**: SistemaHotelSantos-Linux
            
            ## Instalação
            1. Baixe o arquivo correspondente ao seu sistema operacional
            2. Execute para instalar
            3. O sistema atualizará automaticamente em futuras releases
