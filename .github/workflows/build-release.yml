name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GIT_TIMEOUT: 300
  GIT_COMPRESSION: 0

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            nome_saida: SistemaHotelSantos-Windows.exe
          - os: ubuntu-latest
            nome_saida: SistemaHotelSantos-Linux

    steps:
      - name: Configure git timeout
        run: |
          git config --global http.connectTimeout 30
          git config --global http.timeout 300
          git config --global core.compression 0
        shell: bash

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
        timeout-minutes: 10

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
        timeout-minutes: 10

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r sistemahotelsantos/requirements.txt
        timeout-minutes: 15

      - name: Build executable
        run: |
          cd sistemahotelsantos
          pyinstaller --name="SistemaHotelSantos" --onefile --windowed --clean --noconfirm app_gui.py
        shell: bash
        timeout-minutes: 30

      - name: Rename executable (Windows)
        if: runner.os == 'Windows'
        run: cd sistemahotelsantos\dist && ren SistemaHotelSantos.exe SistemaHotelSantos-Windows.exe
        shell: cmd

      - name: Rename executable (Linux)
        if: runner.os == 'Linux'
        run: cd sistemahotelsantos/dist && mv SistemaHotelSantos SistemaHotelSantos-Linux
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.nome_saida }}
          path: sistemahotelsantos/dist/${{ matrix.nome_saida }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 15

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: arquivos

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: arquivos/*/*
          body: |
            # Release ${{ github.ref_name }}
            
            ## 📥 Downloads
            - **Windows**: SistemaHotelSantos-Windows.exe
            - **Linux**: SistemaHotelSantos-Linux
