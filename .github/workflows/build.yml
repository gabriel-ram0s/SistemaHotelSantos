name: Build Windows MSI Installer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install cx_Freeze requests fpdf customtkinter tkcalendar matplotlib babel

      - name: Validar e Corrigir Setup
        shell: powershell
        run: |
          if (Test-Path "app_gui.py") {
              Write-Host "Ajustando setup.py para raiz..."
              (Get-Content setup.py).Replace('sistemahotelsantos/app_gui.py', 'app_gui.py') | Set-Content setup.py
          }

      - name: Gerar Instalador MSI
        shell: powershell
        run: |
          $env:PYTHONPATH = "."
          python setup.py bdist_msi

      - name: Organizar e Assinar
        shell: powershell
        run: |
          mkdir dist_final
          if (Test-Path "dist/*.msi") { Move-Item dist/*.msi dist_final/ }
          "Developed with Gemini AI assistance - Ref 2026" | Out-File -FilePath dist_final/signature.txt -Encoding utf8

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SistemaHotel-MSI
          path: dist_final/
