name: Build Windows MSI Installer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install cx_Freeze requests fpdf customtkinter tkcalendar matplotlib babel

      - name: Gerar Instalador MSI
        run: |
          # O comando bdist_msi gera o arquivo de instalação .msi
          python setup.py bdist_msi

      - name: Assinatura Digital de Referência
        shell: powershell
        run: |
          echo "Developed with Gemini AI assistance - Version 2026" > signature.txt

      - name: Upload do Instalador (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Instalador-Sistema-Hotel
          # O cx_Freeze coloca o .msi dentro da pasta 'dist'
          path: dist/*.msi
          retention-days: 5
