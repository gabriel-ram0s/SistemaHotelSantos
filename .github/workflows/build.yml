name: Build Windows Installer (Professional Setup)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-node@v4 # Opcional se for usar ferramentas JS, mas mantemos focado em Python
        
      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests fpdf customtkinter tkcalendar matplotlib pyinstaller-hooks-contrib babel

      - name: Rodar Testes Unitários
        shell: powershell
        run: |
          $testFile = "sistemahotelsantos/test_sistema.py"
          if (-not (Test-Path $testFile)) { $testFile = "test_sistema.py" }
          if (Test-Path $testFile) {
              python $testFile
          } else {
              Write-Warning "Testes não encontrados. Pulando..."
          }

      - name: Gerar Executável (PyInstaller)
        shell: powershell
        run: |
          $target = "sistemahotelsantos/app_gui.py"
          if (-not (Test-Path $target)) { $target = "app_gui.py" }
          # --collect-all é vital para o CustomTkinter não quebrar no usuário final
          pyinstaller --clean --noconsole --onefile --name "SistemaHotel" --collect-all customtkinter --hidden-import babel.numbers --distpath ./dist $target

      # --- NOVO PASSO: COMPILAÇÃO DO SETUP ---
      
      - name: Compilar Instalador (Inno Setup)
        uses: Codescape-Cloud/Inno-Setup-Action@v1.2.2
        with:
          filepath: 'installer.iss'

      - name: Listar Artefatos para Verificação
        shell: powershell
        run: |
          Write-Host "Verificando Instalador em dist_installer:"
          Get-ChildItem ./dist_installer

      - name: Upload do Instalador (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: SistemaHotel-FullInstaller
          path: dist_installer/*.exe
          retention-days: 7

      - name: Criar Release e Upload do Setup
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist_installer/SistemaHotel_Setup.exe
            dist/SistemaHotel.exe
          body: |
            Build automatizada em 2026.
            Desenvolvido com auxílio de Gemini AI.
            Versão: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
