name: Build Windows Installer

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependências Python
        run: |
          pip install --upgrade pip
          pip install pyinstaller requests fpdf

      - name: Gerar Executável (PyInstaller)
        shell: powershell
        run: |
          # Tenta localizar o script principal
          $target = "sistemahotelsantos/sistema_clientes.py"
          if (-not (Test-Path $target)) { $target = "sistema_clientes.py" }
          
          if (-not (Test-Path $target)) {
              Write-Error "ERRO: Arquivo sistema_clientes.py não encontrado!"
              exit 1
          }
          
          # Gera o .exe na pasta dist na raiz
          pyinstaller --clean --noconsole --onefile --name "SistemaHotel" --distpath ./dist $target

      - name: Instalar Inno Setup
        run: choco install innosetup --no-progress

      - name: Compilar Instalador (ISCC)
        shell: powershell
        run: |
          # 1. Localizar o arquivo .iss (pode estar na raiz ou na subpasta)
          $issFile = Get-ChildItem -Recurse -Filter "setup_script.iss" | Select-Object -First 1
          
          if (-not $issFile) {
              Write-Error "ERRO: Arquivo setup_script.iss não encontrado no repositório."
              exit 1
          }
          
          Write-Host "Arquivo ISS encontrado em: $($issFile.FullName)"
          
          # 2. Mover para a raiz se necessário (para que o Source: dist\... funcione)
          $destPath = Join-Path (Get-Location) "setup_script.iss"
          if ($issFile.FullName -ne $destPath) {
              Move-Item $issFile.FullName $destPath -Force
              Write-Host "Arquivo movido para a raiz para compilação."
          }
          
          # 3. Executar o compilador (ISCC)
          # O Chocolatey adiciona o ISCC ao PATH, então tentamos chamar direto 'iscc'.
          # Se falhar, tentamos o caminho padrão.
          $isccCmd = "iscc"
          if (-not (Get-Command $isccCmd -ErrorAction SilentlyContinue)) {
              $isccCmd = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          }
          
          Write-Host "Compilando com: $isccCmd"
          & $isccCmd "setup_script.iss"

      - name: Listar Arquivos Gerados (Debug)
        run: |
          Write-Host "Conteúdo de Output (Instalador):"
          if (Test-Path "./Output") { Get-ChildItem ./Output } else { Write-Host "Pasta Output não existe." }

      - name: Upload do Instalador (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Instalador-SistemaHotel
          path: Output/*.exe
          retention-days: 5

      - name: Criar Release (Apenas Tags)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/SistemaHotel.exe
            Output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
