name: Build Windows Installer

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependências Python
        run: |
          pip install --upgrade pip
          pip install pyinstaller requests fpdf

      - name: Gerar Executável (PyInstaller)
        shell: powershell
        run: |
          $target = "sistemahotelsantos/sistema_clientes.py"
          if (-not (Test-Path $target)) { $target = "sistema_clientes.py" }
          
          # Gera o .exe na pasta dist na raiz
          pyinstaller --clean --noconsole --onefile --name "SistemaHotel" --distpath ./dist $target

      # --- CORREÇÃO: Instalação Robusta do Inno Setup ---
      - name: Instalar Inno Setup
        run: choco install innosetup --no-progress

      - name: Preparar Script de Instalação
        shell: powershell
        run: |
          # Move o script para a raiz se ele estiver na subpasta, para encontrar a pasta 'dist' corretamente
          if (Test-Path "sistemahotelsantos/setup_script.iss") {
              Move-Item "sistemahotelsantos/setup_script.iss" "setup_script.iss"
              Write-Host "Script movido para a raiz."
          }

      - name: Compilar Instalador (ISCC)
        shell: powershell
        run: |
          # Compila usando o executável padrão do Inno Setup
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup_script.iss

      - name: Listar Arquivos Gerados (Debug)
        run: |
          Write-Host "Conteúdo de Output (Instalador):"
          Get-ChildItem ./Output

      - name: Upload do Instalador (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Instalador-SistemaHotel
          path: Output/*.exe
          retention-days: 5

      - name: Criar Release (Apenas Tags)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/SistemaHotel.exe
            Output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
