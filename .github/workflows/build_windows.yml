name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Executa quando uma tag v* é criada

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Garante que todo o histórico e tags sejam baixados

      - name: Diagnóstico de Arquivos (Debug)
        shell: powershell
        run: |
          Write-Host "--- Estrutura de Diretórios Atual ---"
          Get-ChildItem -Recurse | Select-Object FullName

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Otimiza builds futuros

      - name: Instalar Dependências
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests fpdf

      - name: Gerar Executável
        shell: powershell
        run: |
          $scriptPath = ""
          if (Test-Path "sistemahotelsantos/sistema_clientes.py") {
              $scriptPath = "sistemahotelsantos/sistema_clientes.py"
          } elseif (Test-Path "sistema_clientes.py") {
              $scriptPath = "sistema_clientes.py"
          }

          if ($scriptPath -ne "") {
              Write-Host "Iniciando PyInstaller para: $scriptPath"
              # Adicionada a flag --collect-all se houver dependências ocultas
              pyinstaller --clean --noconsole --onefile --name="SistemaHotel" $scriptPath
          } else {
              Write-Error "ERRO CRÍTICO: O arquivo sistema_clientes.py não foi encontrado em nenhum local esperado."
              exit 1
          }

      - name: Verificar se EXE foi criado
        shell: powershell
        run: |
          if (Test-Path "dist/SistemaHotel.exe") {
              Write-Host "Sucesso: dist/SistemaHotel.exe gerado corretamente."
          } else {
              Write-Error "ERRO: O PyInstaller finalizou, mas o binário não foi encontrado em dist/."
              exit 1
          }

      - name: Publicar Release
        uses: softprops/action-gh-release@v2 # Atualizado para v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/SistemaHotel.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
