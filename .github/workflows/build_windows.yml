name: Build Windows Installer

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependências Python
        run: |
          pip install --upgrade pip
          pip install pyinstaller requests fpdf

      - name: Gerar Executável (PyInstaller)
        shell: powershell
        run: |
          $target = "sistemahotelsantos/sistema_clientes.py"
          if (-not (Test-Path $target)) { $target = "sistema_clientes.py" }
          
          # Gera o .exe na pasta dist
          pyinstaller --clean --noconsole --onefile --name "SistemaHotel" --distpath ./dist $target

      # --- NOVO: Instalar e Rodar Inno Setup ---
      - name: Compilar Instalador (Inno Setup)
        uses: Minionguyjosh/inno-setup-action@v1.2.2
        with:
          path: setup_script.iss
          # O action vai ler o script, pegar o .exe da pasta dist e criar o setup na pasta Output

      - name: Listar Arquivos Gerados (Debug)
        run: |
          Write-Host "Conteúdo de Output (Instalador):"
          Get-ChildItem ./Output

      - name: Upload do Instalador (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Instalador-SistemaHotel
          path: Output/*.exe
          retention-days: 5

      - name: Criar Release (Apenas Tags)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # Anexa tanto o executável puro (para update) quanto o instalador (para novos users)
          files: |
            dist/SistemaHotel.exe
            Output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
