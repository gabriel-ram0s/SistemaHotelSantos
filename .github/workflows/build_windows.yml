name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch: # Permite rodar manualmente na aba Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependências
        run: |
          pip install --upgrade pip
          pip install pyinstaller requests fpdf

      - name: Verificar Arquivos (Debug)
        run: Get-ChildItem -Recurse -Filter "*.py"

      - name: Build com PyInstaller
        shell: powershell
        run: |
          # Define o caminho do script
          $target = "sistemahotelsantos/sistema_clientes.py"
          if (-not (Test-Path $target)) {
            $target = "sistema_clientes.py"
          }
          
          if (-not (Test-Path $target)) {
            Write-Error "ERRO: Arquivo sistema_clientes.py não encontrado!"
            exit 1
          }
          
          Write-Host "Compilando arquivo: $target"
          
          # --distpath ./dist : Força o executável a ir para a pasta dist na raiz
          # --workpath ./build : Força arquivos temporários para build na raiz
          pyinstaller --clean --noconsole --onefile --name "SistemaHotel" --distpath ./dist --workpath ./build $target

      - name: Listar Conteúdo da Pasta Dist (Debug)
        run: Get-ChildItem ./dist

      - name: Upload Artifact (Disponível no Resumo da Action)
        uses: actions/upload-artifact@v4
        with:
          name: SistemaHotel-Windows-Build
          path: dist/SistemaHotel.exe
          if-no-files-found: error
          retention-days: 5

      - name: Criar Release (Apenas se tiver Tag)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/SistemaHotel.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
