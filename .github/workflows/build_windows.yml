name: Build Windows Installer

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependências Python
        run: |
          pip install --upgrade pip
          pip install pyinstaller customtkinter tkcalendar matplotlib requests fpdf2 Pillow
      - name: Rodar Testes Unitários
        shell: powershell
        run: |
          # Localiza o arquivo de teste (pode estar na raiz ou subpasta)
          $testFile = "sistemahotelsantos/test_sistema.py"
          if (-not (Test-Path $testFile)) { $testFile = "test_sistema.py" }
          
          if (Test-Path $testFile) {
              Write-Host "Executando testes em: $testFile"
              python $testFile
          } else {
              Write-Warning "Arquivo de teste não encontrado. Pulando etapa de testes."
          }

      - name: Atualizar Versão a partir da Tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          # Extrai a versão da tag (ex: v4.3.0 -> 4.3.0)
          $version = "${{ github.ref_name }}".Substring(1)
          Write-Host "Atualizando arquivos para a versão: $version"

          # Atualiza setup.iss
          (Get-Content -Path setup.iss) | ForEach-Object { $_ -replace '(#define MyAppVersion\s+")[^"]+(")', "`$1$version`$2" } | Set-Content -Path setup.iss
          # Atualiza a versão no core do sistema (para auto-update)
          (Get-Content -Path sistemahotelsantos/sistema_clientes.py) | ForEach-Object { $_ -replace '(self.versao_atual\s*=\s*")[^"]+(")', "`$1$version`$2" } | Set-Content -Path sistemahotelsantos/sistema_clientes.py
          # Atualiza a versão no título da GUI
          (Get-Content -Path sistemahotelsantos/app_gui.py) | ForEach-Object { $_ -replace '(\.title\("Hotel Santos - Gestao de Creditos v)[^"]+(")', "`$1$version`$2" } | Set-Content -Path sistemahotelsantos/app_gui.py

      - name: Gerar Executável (PyInstaller)
        shell: powershell
        run: |
          # Tenta localizar o script principal da GUI
          $target = "sistemahotelsantos/app_gui.py"
          if (-not (Test-Path $target)) { $target = "app_gui.py" }
          
          if (-not (Test-Path $target)) {
              Write-Error "ERRO: Arquivo app_gui.py não encontrado!"
              exit 1
          }
          
          # Gera o .exe na pasta dist na raiz
          # --collect-all customtkinter garante que temas e assets da lib gráfica sejam incluídos
          # --icon define o ícone do arquivo .exe
          # --add-data embute o arquivo .ico dentro do executável para uso interno (janela)
          pyinstaller --clean --noconsole --onefile --name "SistemaHotel" --icon="sistemahotelsantos/app.ico" --add-data="sistemahotelsantos/app.ico;." --collect-all customtkinter --hidden-import babel.numbers --hidden-import matplotlib.pyplot --hidden-import matplotlib.backends.backend_tkagg --hidden-import tkcalendar --hidden-import requests --hidden-import fpdf --hidden-import fontTools.cu2qu --distpath ./dist --workpath ./build_temp $target

      - name: Listar Arquivos Gerados (Debug - Dist)
        run: |
          Write-Host "Conteúdo de dist (Executável):"
          if (Test-Path "./dist") { Get-ChildItem ./dist } else { Write-Host "Pasta dist não existe." }

      # --- NOVO PASSO: Compilar Instalador com Inno Setup ---
      - name: Compilar Instalador (Inno Setup)
        uses: Minionguyjpro/Inno-Setup-Action@v1
        with:
          path: setup.iss

      - name: Listar Instalador Gerado
        run: |
          Write-Host "Conteúdo de Output (Instalador):"
          if (Test-Path "./Output") { Get-ChildItem ./Output }

      - name: Upload dos Artefatos (Exe e Instalador)
        uses: actions/upload-artifact@v4
        with:
          name: SistemaHotel-Build
          path: |
            dist/*.exe
            Output/*.exe
          retention-days: 5

      - name: Publicar/Atualizar Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # Se a release já foi criada pelo auto_tag, isso apenas faz upload dos arquivos
          files: |
            # O Auto-Update precisa deste arquivo solto:
            dist/SistemaHotel.exe
            # O Usuário baixa este para instalar:
            Output/Instalador_SistemaHotel.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
