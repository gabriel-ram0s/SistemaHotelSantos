name: Build Windows Installer

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependências Python
        run: |
          pip install --upgrade pip
          pip install pyinstaller requests fpdf customtkinter tkcalendar matplotlib pyinstaller-hooks-contrib

      - name: Rodar Testes Unitários
        shell: powershell
        run: |
          # Localiza o arquivo de teste (pode estar na raiz ou subpasta)
          $testFile = "sistemahotelsantos/test_sistema.py"
          if (-not (Test-Path $testFile)) { $testFile = "test_sistema.py" }
          
          if (Test-Path $testFile) {
              Write-Host "Executando testes em: $testFile"
              python $testFile
          } else {
              Write-Warning "Arquivo de teste não encontrado. Pulando etapa de testes."
          }

      - name: Gerar Executável (PyInstaller)
        shell: powershell
        run: |
          # Tenta localizar o script principal da GUI
          $target = "sistemahotelsantos/app_gui.py"
          if (-not (Test-Path $target)) { $target = "app_gui.py" }
          
          if (-not (Test-Path $target)) {
              Write-Error "ERRO: Arquivo app_gui.py não encontrado!"
              exit 1
          }
          
          # Gera o .exe na pasta dist na raiz
          # --collect-all customtkinter garante que temas e assets da lib gráfica sejam incluídos
          pyinstaller --clean --noconsole --onefile --name "SistemaHotel" --collect-all customtkinter --distpath ./dist $target
          pyinstaller --clean --noconsole --onefile --name "SistemaHotel" --collect-all customtkinter --hidden-import babel.numbers --distpath ./dist $target

      - name: Listar Arquivos Gerados (Debug - Dist)
        run: |
          Write-Host "Conteúdo de dist (Executável):"
          if (Test-Path "./dist") { Get-ChildItem ./dist } else { Write-Host "Pasta dist não existe." }

      - name: Upload do Executável (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: SistemaHotel-Exe
          path: dist/*.exe
          retention-days: 5

      - name: Criar Release (Apenas Tags)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/SistemaHotel.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
