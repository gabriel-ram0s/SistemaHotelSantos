name: Build Windows EXE

on:
  push:
    tags:
      - 'v*' # Dispara apenas quando você envia uma tag (ex: v1.0.1, v1.0.2)

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests fpdf

    - name: Gerar Executável com PyInstaller
      # --noconsole: não abre a tela preta do terminal
      # --onefile: gera um único arquivo .exe
      run: |
        pyinstaller --noconsole --onefile --name="SistemaHotel" sistemahotelsantos/sistema_clientes.py

    - name: Criar Release no GitHub
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/SistemaHotel.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
