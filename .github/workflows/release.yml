name: Release Automática

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  calculate-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.tag_version.outputs.new_version }}
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Calcular Próxima Versão
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          dry_run: true

  build:
    needs: calculate-version
    if: needs.calculate-version.outputs.new_tag != ''
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            sep: ';'
            exe_name: SistemaHotel.exe
          - os: ubuntu-latest
            sep: ':'
            exe_name: SistemaHotel_Linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependências do sistema (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Instalar Dependências
        run: |
          pip install --upgrade pip
          pip install pyinstaller customtkinter tkcalendar matplotlib requests fpdf2 Pillow Babel

      - name: Executar Testes Automatizados
        run: |
          python sistemahotelsantos/test_sistema.py

      - name: Atualizar Versão nos Arquivos (Para Build)
        # Executa o script dedicado, que é mais robusto que scripts inline
        run: python .github/scripts/update_versions.py
        env:
          NEW_VERSION: ${{ needs.calculate-version.outputs.new_version }}

      - name: Compilar Executável (PyInstaller)
        run: |
          pyinstaller --clean --noconsole --onefile --name "SistemaHotel" --icon="sistemahotelsantos/app.ico" --add-data="sistemahotelsantos/app.ico${{ matrix.sep }}." --collect-all customtkinter --hidden-import babel.numbers --hidden-import matplotlib.pyplot --hidden-import matplotlib.backends.backend_tkagg --hidden-import tkcalendar --hidden-import requests --hidden-import fpdf --hidden-import fontTools.cu2qu --distpath ./dist --workpath ./build_temp sistemahotelsantos/app_gui.py

      - name: Renomear Executável Linux
        if: matrix.os == 'ubuntu-latest'
        run: mv dist/SistemaHotel dist/SistemaHotel_Linux

      - name: Compilar Instalador (Inno Setup)
        if: matrix.os == 'windows-latest' && hashFiles('setup.iss') != ''
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: setup.iss

      - name: Upload dos Artefatos
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ matrix.os }}
          path: |
            dist/${{ matrix.exe_name }}
            Output/Instalador_SistemaHotel.exe
          if-no-files-found: ignore

  release:
    needs: [calculate-version, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.build.result == 'success' && needs.calculate-version.outputs.new_tag != ''

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Atualizar Versão nos Arquivos (Para Commit)
        # Reutiliza o mesmo script robusto para o commit final
        run: python .github/scripts/update_versions.py
        env:
          NEW_VERSION: ${{ needs.calculate-version.outputs.new_version }}

      - name: Fazer commit das mudanças de versão
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Bump version to ${{ needs.calculate-version.outputs.new_tag }} [skip ci]"

      - name: Download dos Artefatos
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.calculate-version.outputs.new_tag }}
          name: Release ${{ needs.calculate-version.outputs.new_tag }}
          body: ${{ needs.calculate-version.outputs.changelog }}
          target_commitish: ${{ steps.auto_commit.outputs.commit_hash }}
          files: |
            artifacts/build-artifact-windows-latest/SistemaHotel.exe
            artifacts/build-artifact-windows-latest/Instalador_SistemaHotel.exe
            artifacts/build-artifact-ubuntu-latest/SistemaHotel_Linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}