name: Build & Release

on:
  push:
    tags:
      - 'v*' # Roda apenas quando uma tag de versão (ex: v1.2.3) é enviada
  workflow_dispatch:

permissions:
  contents: write # Necessário para a action softprops/action-gh-release criar a release

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: SistemaHotelSantos.exe
            asset_name_release: SistemaHotelSantos-Windows.exe
            sep: ';'
          - os: ubuntu-latest
            artifact_name: SistemaHotelSantos
            asset_name_release: SistemaHotelSantos-Ubuntu
            sep: ':'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # Instala as dependências do seu projeto a partir do requirements.txt
          pip install -r sistemahotelsantos/requirements.txt
          # Instala babel explicitamente, uma dependência oculta comum do tkcalendar
          pip install babel

      - name: Build with PyInstaller
        # O comando é unificado para Windows e Linux, usando a variável de separador de path
        run: |
          pyinstaller --name="SistemaHotelSantos" --onefile --windowed --clean --noconfirm \
          --icon="sistemahotelsantos/app.ico" \
          --add-data="sistemahotelsantos/app.ico${{ matrix.sep }}." \
          --paths="sistemahotelsantos" \
          --hidden-import="babel.numbers" \
          --hidden-import="PIL" \
          sistemahotelsantos/app_gui.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name_release }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*/*
          draft: false
          prerelease: false
          generate_release_notes: true # Gera o changelog automaticamente a partir dos commits
